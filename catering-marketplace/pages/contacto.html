<!doctype html>
<html lang="es">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width,initial-scale=1">
	<title>Contacto - Catering Marketplace</title>

	<!-- Bootstrap -->
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

	<!-- Font Awesome -->
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

	<!-- CSS -->
	<link rel="stylesheet" href="../assets/css/style.css">
	<style>
		:root{--bg:#f4f6f8;--card:#ffffff;--primary:#0b76ef;--muted:#6b7280;--input-border:#e6e9ef;--radius:10px}
		body{background:var(--bg);font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,"Helvetica Neue",Arial;line-height:1.4;color:#111}
		.contact-container{max-width:820px;margin:56px auto;padding:38px;background:transparent}
		.contact-card{background:var(--card);padding:28px;border-radius:14px;box-shadow:0 6px 20px rgba(16,24,40,0.06);border:1px solid rgba(16,24,40,0.03)}
		.contact-card h1{margin:0 0 8px 0;font-size:1.5rem}
		.contact-card p{margin:0 0 20px 0;color:var(--muted)}

		.form-row{display:flex;gap:20px}
		.form-row .form-group{flex:1}
		.form-group{margin-bottom:18px}
		label{display:block;font-weight:600;margin-bottom:8px;color:#111;font-size:0.95rem}

		.form-control{width:100%;padding:12px 14px;border:1px solid var(--input-border);border-radius:10px;background:#fff;font-size:1rem;transition:box-shadow .15s, border-color .15s}
		.form-control::placeholder{color:#9aa3b2}
		textarea.form-control{min-height:140px;resize:vertical}
		.form-control:focus{outline:none;border-color:var(--primary);box-shadow:0 6px 18px rgba(11,118,239,0.08)}

		.form-actions{display:flex;justify-content:flex-end;align-items:center;gap:12px;margin-top:8px}
		.btn{padding:12px 18px;background:linear-gradient(180deg,var(--primary),#055fcf);color:#fff;border-radius:10px;border:none;cursor:pointer;font-weight:700;box-shadow:0 6px 18px rgba(11,118,239,0.12)}
		.btn:active{transform:translateY(1px)}
		.btn.secondary{background:#eef3ff;color:var(--primary);box-shadow:none;border:1px solid rgba(11,118,239,0.06)}

		.success{display:none;padding:12px;margin-top:12px;background:#ecfdf3;border:1px solid #d1fae5;color:#065f46;border-radius:8px}

		@media(max-width:720px){
			.form-row{flex-direction:column}
			.form-actions{flex-direction:column;align-items:stretch}
			.btn{width:100%}
		}
	</style>
</head>
<body>
	<!-- Navbar (copiado desde index, rutas ajustadas) -->
	<nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
		<div class="container">
			<a class="navbar-brand fw-bold" href="../index.html">
				Catering Marketplace
			</a>

			<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
				<span class="navbar-toggler-icon"></span>
			</button>

			<div class="collapse navbar-collapse" id="menu">

				<ul class="navbar-nav ms-auto">

					<li class="nav-item">
						<a class="nav-link" href="../index.html#inicio">Inicio</a>
					</li>

					<li class="nav-item" id="menuCatalogo">
						<a class="nav-link" href="catalogo.html">Catálogo</a>
					</li>

					<li class="nav-item" id="menuContacto">
						<a class="nav-link" href="contacto.html">Contáctanos</a>
					</li>

					<li class="nav-item" id="menuCarrito">
						<a class="nav-link" href="#" data-bs-toggle="offcanvas" data-bs-target="#carritoCanvas">

							<i class="fa-solid fa-cart-shopping"></i>
							Carrito

							<span id="contadorCarrito" class="badge bg-warning text-dark">0</span>

						</a>
					</li>

				<li class="nav-item" id="contenedorSesion">

					<a class="btn btn-outline-light ms-2" href="login.html" id="btnLogin">Iniciar Sesión</a>

				</li>
				
				</ul>

			</div>

		</div>
	</nav>

	<main class="contact-container">
		<div class="contact-card">
			<h1>Contáctanos</h1>
			<p>¿Tienes una pregunta o necesitas una cotización? Envíanos un mensaje y te responderemos pronto.</p>

			<form id="contactForm" novalidate>
				<div class="form-row">
					<div class="form-group">
						<label for="nombre">Nombre completo</label>
						<input id="nombre" name="nombre" type="text" class="form-control" placeholder="Tu nombre" required>
					</div>
					<div class="form-group">
						<label for="telefono">Teléfono</label>
						<input id="telefono" name="telefono" type="text" class="form-control" placeholder="Opcional">
					</div>
				</div>

				<div class="form-group">
					<label for="email">Correo electrónico</label>
					<input id="email" name="email" type="email" class="form-control" placeholder="tucorreo@ejemplo.com" required>
				</div>

				<div class="form-group">
					<label for="mensaje">Mensaje</label>
					<textarea id="mensaje" name="mensaje" class="form-control" placeholder="Cuéntanos en qué podemos ayudarte" required></textarea>
				</div>

				<div class="form-actions">
					<div id="formSuccess" class="success" role="status">Gracias — tu mensaje se ha enviado correctamente.</div>
					<button type="submit" class="btn">Enviar mensaje</button>
				</div>
			</form>
		</div>
	</main>

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
	<script src="../assets/js/contacto.js"></script>
</body>
</html>
