<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
        rel="stylesheet">

</head>

<body class="bg-light">

    <div class="container">

        <div class="row justify-content-center mt-5">

            <div class="col-md-5">

                <div class="card shadow">

                    <div class="card-body">

                        <h3 class="text-center mb-4">

                            Iniciar Sesión

                        </h3>

                        <form id="loginForm">

                            <div class="mb-3">

                                <label>

                                    Correo

                                </label>

                                <input
                                    type="email"
                                    class="form-control"
                                    id="correo">

                            </div>

                            <div class="mb-3">

                                <label>

                                    Contraseña

                                </label>

                                <input
                                    type="password"
                                    class="form-control"
                                    id="password">

                            </div>

                            <button
                                class="btn btn-primary w-100">

                                Ingresar

                            </button>

                        </form>

                    </div>

                </div>

            </div>

        </div>

    </div>

    <script src="../assets/js/login.js"></script>

</body>

</html>
