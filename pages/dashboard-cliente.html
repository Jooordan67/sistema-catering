<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Dashboard Cliente</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

    <nav class="navbar navbar-dark bg-dark">

        <div class="container">

            <span class="navbar-brand">

                Dashboard Cliente

            </span>

            <div class="d-flex align-items-center">

                <span id="nombreUsuario" class="text-white me-3">
                </span>

                <a href="../index.html" class="btn btn-primary me-2">

                    Inicio

                </a>

                <button class="btn btn-danger" id="btnCerrarSesion">

                    Cerrar Sesión

                </button>

            </div>

        </div>

    </nav>

    <div class="container mt-4">

        <h2 class="mb-4">
            Mis Cotizaciones
        </h2>

        <div id="listaCotizaciones">

        </div>

        <hr class="my-5">

        <h2 class="mb-4">
            Mis Pedidos
        </h2>

        <div id="listaPedidos">

        </div>

    </div>

    </div>

    <!-- Modal Modificar Pedido -->
    <div class="modal fade" id="modalModificarPedido" tabindex="-1">

        <div class="modal-dialog">

            <div class="modal-content">

                <div class="modal-header">

                    <h5 class="modal-title">

                        Modificar Pedido

                    </h5>

                    <button type="button" class="btn-close" data-bs-dismiss="modal">
                    </button>

                </div>

                <div class="modal-body">

                    <form id="formModificarPedido">

                        <input type="hidden" id="pedidoModificarId">

                        <div class="mb-3">

                            <label class="form-label">

                                Fecha

                            </label>

                            <input type="date" class="form-control" id="modFecha">

                        </div>

                        <div class="mb-3">

                            <label class="form-label">

                                Personas

                            </label>

                            <input type="number" class="form-control" id="modPersonas">

                        </div>

                        <div class="mb-3">

                            <label class="form-label">

                                Lugar

                            </label>

                            <input type="text" class="form-control" id="modLugar">

                        </div>

                        <div class="mb-3">

                            <label class="form-label">

                                Observaciones

                            </label>

                            <textarea class="form-control" id="modObservaciones">
                        </textarea>

                        </div>

                        <button type="submit" class="btn btn-primary">

                            Guardar Cambios

                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

    <!-- Modal Pago -->
    <div class="modal fade" id="modalPago" tabindex="-1">

        <div class="modal-dialog">

            <div class="modal-content">

                <div class="modal-header">

                    <h5 class="modal-title">
                        Pago de Adelanto
                    </h5>

                    <button type="button" class="btn-close" data-bs-dismiss="modal">
                    </button>

                </div>

                <div class="modal-body">

                    <input type="hidden" id="cotizacionSeleccionada">

                    <p>
                        <strong>Monto a pagar (50%):</strong>
                    </p>

                    <h3 class="text-success">
                        S/. <span id="montoPago">0</span>
                    </h3>

                    <hr>

                    <label class="form-label">
                        Método de Pago
                    </label>

                    <select class="form-select" id="metodoPago">

                        <option value="Tarjeta">
                            Tarjeta de Crédito / Débito
                        </option>

                        <option value="Yape">
                            Yape
                        </option>


                    </select>

                    <div id="datosPago" class="mt-3">

                    </div>

                </div>

                <div class="modal-footer">

                    <button type="button" class="btn btn-success" id="btnConfirmarPago">

                        Pagar Adelanto

                    </button>

                </div>

            </div>

        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/dashboard-cliente.js"></script>

</body>

</html>
